<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ניהול כרטיסים</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--txt:#111827;--mut:#6b7280;--pri:#6c47ff;--pri2:#8b6dff;--bd:#d7dbe7;--sh:0 8px 28px rgba(0,0,0,.08)}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,Segoe UI,Arial}
.app{max-width:860px;margin:0 auto;padding:16px}
.top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}
.brand{font-weight:800;font-size:22px}
.sub{color:var(--mut);font-size:13px}
.panel{background:var(--card);border:1px solid var(--bd);border-radius:18px;box-shadow:var(--sh);padding:14px}
.row{display:grid;grid-template-columns:1fr auto;gap:10px}
input,textarea{width:100%;border:1px solid var(--bd);border-radius:14px;padding:13px 12px;font:inherit;background:#fff;color:var(--txt)}
input:focus,textarea:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 4px rgba(108,71,255,.12)}
button{border:0;border-radius:14px;padding:12px 14px;font:inherit;font-weight:700;cursor:pointer;transition:transform .1s}
button:active{transform:scale(.97)}
.pri{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff}
.sec{background:#eef1ff;color:#24134f}
.ghost{background:#f3f4f6;color:#111827}
.danger{background:#fee2e2;color:#991b1b}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.chip{font-size:12px;color:var(--mut);background:#f1f5f9;border:1px solid var(--bd);border-radius:999px;padding:6px 10px}
.summary{display:none;margin-top:14px;padding:14px;gap:14px;flex-wrap:wrap;background:linear-gradient(135deg,#fff,#f6f0ff);border:1px solid var(--bd);border-radius:14px}
.sum-val{font-size:20px;font-weight:800}
.sum-lbl{font-size:12px;color:var(--mut)}
.list{display:grid;gap:12px;margin-top:16px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:18px;box-shadow:var(--sh);padding:14px}
.card-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.num{font-weight:800;direction:ltr;unicode-bidi:plaintext;font-variant-numeric:tabular-nums;letter-spacing:.04em;font-size:16px}
.lbl{color:var(--mut);font-size:12px;margin-top:2px}
.badge{font-size:12px;font-weight:800;border-radius:999px;padding:6px 12px;white-space:nowrap}
.s-idle{background:#f3f4f6;color:#475467}
.s-checking{background:#e9e7ff;color:#5b43d6}
.s-ok{background:#dcfce7;color:#166534}
.s-zero{background:#fef3c7;color:#a16207}
.s-err{background:#fee2e2;color:#991b1b}
.card-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.mini{padding:9px 10px;font-size:12px;border-radius:12px}
.reveal-box{margin-top:10px;background:#fafafa;border:1px dashed var(--bd);border-radius:14px;padding:10px;font-size:13px}
.hidden{display:none}
#toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 18px;border-radius:999px;box-shadow:var(--sh);opacity:0;pointer-events:none;transition:opacity .2s;max-width:90vw;text-align:center;z-index:999}
#toast.show{opacity:1}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;padding:14px;z-index:1000}
.overlay.show{display:flex}
.modal{width:100%;max-width:520px;background:var(--card);border-radius:20px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{margin:0 0 12px;font-size:18px}
@media(max-width:600px){.row{grid-template-columns:1fr}.top{flex-direction:column;align-items:flex-start}.summary{display:flex}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div>
      <div class="brand">ניהול כרטיסים</div>
      <div class="sub">שמירה מקומית · בדיקה אונליין · גיבוי וייבוא</div>
    </div>
    <button class="ghost" id="themeBtn">☼ / ☾</button>
  </div>

  <div class="panel">
    <div class="row">
      <input id="cardInput" type="tel" inputmode="numeric" maxlength="23" placeholder="הזן מספר כרטיס" autocomplete="off">
      <button class="pri" id="addBtn">+ הוסף</button>
    </div>
    <div class="chips">
      <span class="chip">מיון לפי יתרה</span>
      <span class="chip">גיבוי וייבוא TXT</span>
      <span class="chip">שמירה מקומית</span>
    </div>
    <div class="btns">
      <button class="sec" id="checkAllBtn">רענן הכל</button>
      <button class="sec" id="exportBtn">⬇ גיבוי TXT</button>
      <button class="sec" id="importBtn">⬆ ייבוא TXT</button>
      <button class="ghost" id="sortBtn">↕ סדר לפי יתרה</button>
    </div>
    <div class="summary" id="summary">
      <div><div class="sum-val" id="sumCount">0</div><div class="sum-lbl">כרטיסים</div></div>
      <div><div class="sum-val" id="sumLoaded">0</div><div class="sum-lbl">נבדקו</div></div>
      <div><div class="sum-val" id="sumTotal">0 ₪</div><div class="sum-lbl">סה"כ יתרה</div></div>
    </div>
  </div>

  <div id="list" class="list"></div>
  <div id="emptyMsg" class="panel" style="margin-top:16px;text-align:center;color:var(--mut);padding:28px">אין כרטיסים עדיין — הוסף מספר כרטיס למעלה</div>
</div>

<div id="toast"></div>

<div class="overlay" id="importOverlay">
  <div class="modal">
    <h3>ייבוא גיבוי TXT</h3>
    <div style="color:var(--mut);font-size:13px;margin-bottom:12px">בחר קובץ TXT שמור, או הדבק ישירות כאן.</div>
    <input id="importFile" type="file" accept=".txt,text/plain" style="margin-bottom:10px">
    <textarea id="importText" rows="7" placeholder="הדבק תוכן גיבוי כאן"></textarea>
    <div class="btns" style="justify-content:flex-end;margin-top:14px">
      <button class="ghost" id="importCancel">ביטול</button>
      <button class="pri" id="importDo">ייבא</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
var KEY='nedarim-cards-v1';
var cards=[];
var isDark=false;

function uid(){return Math.random().toString(36).slice(2,10)}

function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t=setTimeout(function(){el.classList.remove('show')},2200);
}

function saveData(){
  try{localStorage.setItem(KEY,JSON.stringify(cards))}catch(e){}
}

function loadData(){
  try{var d=localStorage.getItem(KEY);return d?JSON.parse(d):[]}catch(e){return[]}
}

function parseNum(s){
  var m=String(s||'').match(/\d+/g);
  return m?m.join(''):'';
}

function fmt(n){
  return String(n||'').replace(/\D/g,'').replace(/(.{4})/g,'$1 ').trim();
}

function stClass(c){
  if(c.status==='checking') return 's-checking';
  if(c.status==='error') return 's-err';
  if(c.status==='loaded') return (c.balance||0)>0?'s-ok':'s-zero';
  return 's-idle';
}

function stLabel(c){
  if(c.status==='checking') return 'בודק...';
  if(c.status==='error') return 'שגיאה';
  if(c.status==='loaded') return (c.balance||0)>0?(c.balance.toLocaleString('he-IL')+' ₪'):'0 ₪';
  return 'ממתין';
}

function sortCards(){
  cards.sort(function(a,b){
    var pa=a.status==='loaded'?0:1;
    var pb=b.status==='loaded'?0:1;
    if(pa!==pb) return pa-pb;
    return (b.balance||0)-(a.balance||0);
  });
}

function render(){
  sortCards();
  var list=document.getElementById('list');
  var empty=document.getElementById('emptyMsg');
  var sum=document.getElementById('summary');
  var loaded=cards.filter(function(c){return c.status==='loaded'});
  var total=loaded.reduce(function(s,c){return s+(c.balance||0)},0);
  document.getElementById('sumCount').textContent=cards.length;
  document.getElementById('sumLoaded').textContent=loaded.length;
  document.getElementById('sumTotal').textContent=total.toLocaleString('he-IL')+' ₪';
  sum.style.display=cards.length?'flex':'none';
  empty.style.display=cards.length?'none':'block';
  var html='';
  for(var i=0;i<cards.length;i++){
    var c=cards[i];
    var sc=stClass(c);
    var sl=stLabel(c);
    html+='<div class="card">';
    html+='<div class="card-head">';
    html+='<div><div class="num">'+fmt(c.number)+'</div>';
    html+='<div class="lbl">'+(c.kupaName||'לא נבדק עדיין')+'</div></div>';
    html+='<div class="badge '+sc+'">'+sl+'</div>';
    html+='</div>';
    html+='<div class="card-btns">';
    html+='<button class="mini ghost" onclick="doCheck(''+c.id+'')">בדוק</button>';
    html+='<button class="mini ghost" onclick="doReveal(''+c.id+'')">'+( c.revealed?'הסתר':'הצג מספר')+'</button>';
    html+='<button class="mini ghost" onclick="doCopy(''+c.number+'')">העתק</button>';
    html+='<button class="mini ghost" onclick="doSpeak(''+c.number+'')">הקרא</button>';
    html+='<button class="mini danger" onclick="doDelete(''+c.id+'')">מחק</button>';
    html+='</div>';
    if(c.revealed){
      html+='<div class="reveal-box"><b>מספר מלא:</b> '+fmt(c.number)+'</div>';
    }
    html+='</div>';
  }
  list.innerHTML=html;
}

window.doCheck=function(id){
  var c=cards.find(function(x){return x.id===id});
  if(!c) return;
  c.status='checking'; saveData(); render();
  var fd=new FormData();
  fd.append('MagneticCard',String(c.number).trim());
  fetch('https://matara.pro/NedarimPlus/Mechubad/Manage.aspx?Action=GetCardTlushim',{method:'POST',body:fd})
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.Result==='Error'){
      c.status='error'; c.kupaName=d.Message||'שגיאה';
    } else {
      c.status='loaded';
      c.kupaName=d.ManhpikKupaName||'';
      var total=0;
      var arr=Array.isArray(d.Total)?d.Total:(Array.isArray(d.data)?d.data:[]);
      for(var i=0;i<arr.length;i++){
        var v=arr[i];
        total+=parseFloat(String(v.FreeAmount||v.Units||v.Amount||0).replace(/[^\d.]/g,''))||0;
      }
      c.balance=total;
    }
    saveData(); render();
  })
  .catch(function(e){
    c.status='error'; c.kupaName=e.message||'שגיאה';
    saveData(); render();
  });
};

window.doReveal=function(id){
  var c=cards.find(function(x){return x.id===id});
  if(c){c.revealed=!c.revealed; saveData(); render();}
};

window.doCopy=function(num){
  navigator.clipboard.writeText(String(num))
  .then(function(){toast('הועתק')})
  .catch(function(){toast('ההעתקה נכשלה')});
};

window.doSpeak=function(num){
  if(!window.speechSynthesis){toast('הקראה לא נתמכת');return;}
  var u=new SpeechSynthesisUtterance(String(num).split('').join(' '));
  u.lang='he-IL';
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
};

window.doDelete=function(id){
  if(!confirm('למחוק את הכרטיס?')) return;
  cards=cards.filter(function(c){return c.id!==id});
  saveData(); render(); toast('נמחק');
};

function addCard(){
  var inp=document.getElementById('cardInput');
  var num=parseNum(inp.value);
  if(num.length<8){toast('מספר קצר מדי');return;}
  if(cards.some(function(c){return c.number===num})){toast('הכרטיס כבר קיים');return;}
  var c={id:uid(),number:num,status:'idle',balance:null,kupaName:'',revealed:false};
  cards.unshift(c);
  inp.value='';
  saveData(); render();
  doCheck(c.id);
}

function exportBackup(){
  if(!cards.length){toast('אין כרטיסים לגיבוי');return;}
  var lines=['Card Backup - '+new Date().toLocaleString('he-IL'),'Count: '+cards.length,''];
  for(var i=0;i<cards.length;i++) lines.push(JSON.stringify(cards[i]));
  var blob=new Blob([lines.join('
')],{type:'text/plain;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='cards-backup-'+new Date().toISOString().slice(0,10)+'.txt';
  a.style.display='none'; document.body.appendChild(a); a.click();
  setTimeout(function(){URL.revokeObjectURL(url);a.remove();},1000);
  toast('הגיבוי נשמר');
}

function openImport(){document.getElementById('importOverlay').classList.add('show');}
function closeImport(){document.getElementById('importOverlay').classList.remove('show');}

function doImport(){
  var f=document.getElementById('importFile').files[0];
  var txt=document.getElementById('importText').value.trim();
  function process(raw){
    if(!raw){toast('אין תוכן לייבוא');return;}
    var added=0;
    var existing=new Set(cards.map(function(c){return c.number}));
    var lines=raw.split(/?
/);
    for(var i=0;i<lines.length;i++){
      var line=lines[i].trim();
      if(!line) continue;
      try{
        var obj=JSON.parse(line);
        if(obj&&obj.number&&!existing.has(String(obj.number))){
          obj.number=String(obj.number);
          obj.id=obj.id||uid();
          obj.revealed=false;
          cards.push(obj); existing.add(obj.number); added++;
          continue;
        }
      }catch(e){}
      var nums=line.match(/\d{8,23}/g)||[];
      for(var j=0;j<nums.length;j++){
        if(!existing.has(nums[j])){
          cards.push({id:uid(),number:nums[j],status:'idle',balance:null,kupaName:'',revealed:false});
          existing.add(nums[j]); added++;
        }
      }
    }
    saveData(); render(); closeImport();
    toast(added?'יובאו '+added+' כרטיסים':'אין חדשים לייבוא');
  }
  if(f){var r=new FileReader(); r.onload=function(e){process(e.target.result)}; r.readAsText(f,'utf-8');}
  else process(txt);
}

function setTheme(dark){
  isDark=dark;
  localStorage.setItem('theme',dark?'dark':'light');
  document.documentElement.style.setProperty('--bg',dark?'#0f1115':'#f6f7fb');
  document.documentElement.style.setProperty('--card',dark?'#181b22':'#fff');
  document.documentElement.style.setProperty('--txt',dark?'#e7eaf0':'#111827');
  document.documentElement.style.setProperty('--mut',dark?'#a7afbf':'#6b7280');
  document.documentElement.style.setProperty('--bd',dark?'#2a2f3a':'#d7dbe7');
  document.body.style.background='var(--bg)';
}

window.addEventListener('load',function(){
  cards=loadData();
  isDark=localStorage.getItem('theme')==='dark';
  setTheme(isDark);
  render();
  document.getElementById('addBtn').onclick=addCard;
  document.getElementById('cardInput').onkeydown=function(e){if(e.key==='Enter') addCard();};
  document.getElementById('checkAllBtn').onclick=async function(){
    if(!cards.length){toast('אין כרטיסים');return;}
    for(var i=0;i<cards.length;i++){
      doCheck(cards[i].id);
      await new Promise(function(r){setTimeout(r,300)});
    }
  };
  document.getElementById('exportBtn').onclick=exportBackup;
  document.getElementById('importBtn').onclick=openImport;
  document.getElementById('importCancel').onclick=closeImport;
  document.getElementById('importDo').onclick=doImport;
  document.getElementById('sortBtn').onclick=function(){sortCards();saveData();render();toast('מוין לפי יתרה');};
  document.getElementById('themeBtn').onclick=function(){setTheme(!isDark);};
});

})();
</script>
</body>
</html>
